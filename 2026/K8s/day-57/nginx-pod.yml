kind: Pod
apiVersion: v1
metadata: 
  name: readiness-pod
  labels:
    app: nginx
spec:
  containers:
    - name: nginx-cont
      image: nginx:latest
      ports:
        - containerPort: 80
      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 5
