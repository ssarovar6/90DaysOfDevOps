kind: Pod
apiVersion: v1
metadata:
  name: polinux-pod
spec:
  containers:
    - name: polinux-container
      image: polinux/stress
      resources:
        requests:
          memory: 50Mi
        limits:
          memory: 100Mi
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "200M", "--vm-hang", "1"]
