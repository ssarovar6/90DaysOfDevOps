kind: Pod
apiVersion: v1
metadata:
  name: livenes-pod
spec:
  containers:
    - name: busybox
      image: busybox:latest
      command: ["sh", "-c", "touch /tmp/healthy && sleep 30"]
      args: 
        - rm -f /tmp/healthy && sleep 600
      livenessProbe:
        exec:
          command: ["cat /tmp/healthy"]
        periodSeconds: 5
        failureThreshold: 3

