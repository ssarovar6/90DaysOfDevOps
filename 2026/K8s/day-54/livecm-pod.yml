kind: Pod
apiVersion: v1
metadata:
  name: live-pod
spec:
  containers:
    - name: live-container
      image: nginx:latest
      ports:
        - containerPort: 80
      volumeMounts:
        - name: live-volume
          mountPath: /etc/nginx/conf.d
  volumes:
    - name: live-volume
      configMap:
        name: live-config 
